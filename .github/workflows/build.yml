# ──────────────────────────────────────────────────────────────────────────────
# PrepAura — CI/CD Build Workflow
#
# Repo structure:  SmartUser/          ← repo root (this file lives here)
#                    └── smart-overlay/ ← Electron app
#
# All run steps execute inside smart-overlay/ via defaults.run.working-directory.
# Uses: steps (checkout, cache, upload) reference paths from the repo root.
#
# Triggers:
#   • Every push to main
#   • Every pull request targeting main
#   • Manual trigger via GitHub UI (workflow_dispatch)
#
# Matrix:
#   • macOS latest  → PrepAura-*.dmg  (arm64, unsigned)
#   • Windows latest → PrepAura-*.exe (NSIS x64, unsigned)
#
# Node 20 LTS — matches the Node version bundled inside Electron 34 (20.18.x).
# ──────────────────────────────────────────────────────────────────────────────

name: Build PrepAura

# Opt into Node.js 24 for action runners (checkout, cache, upload-artifact, etc.)
# Required before June 16 2026 — after that date Node 20 actions are force-migrated.
# This does NOT change the Node version used to build the app (set by actions/setup-node).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

  push:
    branches: [main]

  pull_request:
    branches: [main]

jobs:
  build:
    name: Build — ${{ matrix.os-name }}
    runs-on: ${{ matrix.os }}

    # All `run:` steps execute inside smart-overlay/ automatically.
    # `uses:` steps (checkout, cache, upload-artifact) are unaffected and
    # still operate relative to the repo root.
    defaults:
      run:
        working-directory: smart-overlay

    strategy:
      # Both builds run to completion even if one fails.
      fail-fast: false
      matrix:
        include:
          # ── macOS arm64 DMG ──────────────────────────────────────────────
          - os: macos-latest
            os-name: macOS
            build-cmd: build:mac
            artifact-name: PrepAura-Mac
            artifact-path: smart-overlay/dist/*.dmg

          # ── Windows x64 NSIS installer ───────────────────────────────────
          # Builds natively on the Windows runner — no wine required.
          # NSIS and 7-Zip are pre-installed on windows-latest.
          - os: windows-latest
            os-name: Windows
            build-cmd: build:win
            artifact-name: PrepAura-Windows
            artifact-path: smart-overlay/dist/*.exe

    env:
      # Redirect Electron binary + electron-builder tool downloads into the
      # workspace so they are covered by the actions/cache step below.
      #   ELECTRON_CACHE        — honoured by @electron/get (runs during npm ci)
      #   ELECTRON_BUILDER_CACHE — honoured by electron-builder for NSIS/7-zip
      ELECTRON_CACHE: ${{ github.workspace }}/smart-overlay/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/smart-overlay/.cache/electron-builder

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────────────────
      # cache: 'npm' caches ~/.npm keyed on the lock file.
      # cache-dependency-path points to the lock file from the repo root.
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: smart-overlay/package-lock.json

      # ── 3. Electron binary + builder tools cache ─────────────────────────
      # Saves ~150 MB Electron binary + NSIS/7-Zip on repeat runs.
      # Key includes the lock file hash — invalidates on Electron version bumps.
      - name: Cache Electron binaries and build tools
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/smart-overlay/.cache
          key: ${{ runner.os }}-electron-${{ hashFiles('smart-overlay/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      # ── 4. Install ───────────────────────────────────────────────────────
      # Runs inside smart-overlay/ (defaults.run.working-directory).
      # npm ci requires package-lock.json and errors if it would be changed.
      - name: Install dependencies
        run: npm ci

      # ── 5. Build ─────────────────────────────────────────────────────────
      # macOS:   npm run build:mac → electron-builder --mac --publish never
      #          Output: smart-overlay/dist/PrepAura-*.dmg
      # Windows: npm run build:win → electron-builder --win --publish never
      #          Output: smart-overlay/dist/PrepAura Setup *.exe
      - name: Build — ${{ matrix.os-name }}
        run: npm run ${{ matrix.build-cmd }}

      # ── 6. Upload artifact ───────────────────────────────────────────────
      # Paths are relative to the repo root (not working-directory).
      # if-no-files-found: error fails loudly if the build produced nothing.
      - name: Upload — ${{ matrix.artifact-name }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
          retention-days: 30

      # ── 7. Build summary ─────────────────────────────────────────────────
      # Always runs so failures are also summarised in the Actions UI.
      - name: Write build summary
        if: always()
        shell: bash
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            ICON="✅"
          else
            ICON="❌"
          fi

          {
            echo "## ${ICON} PrepAura — ${{ matrix.os-name }} Build"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Platform | ${{ matrix.os-name }} |"
            echo "| Status | ${{ job.status }} |"
            echo "| Artifact | \`${{ matrix.artifact-name }}\` |"
            echo "| Output pattern | \`${{ matrix.artifact-path }}\` |"
            echo "| Trigger | \`${{ github.event_name }}\` |"
            echo "| Branch | \`${{ github.ref_name }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Retention | 30 days |"
          } >> "$GITHUB_STEP_SUMMARY"
